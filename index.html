<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flourish Psychology</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#1a6b6a;--tm:#2d8b89;--ts:#e8f4f3;--tg:rgba(26,107,106,.12);--cr:#faf8f4;--gd:#c4a265;--gs:rgba(196,162,101,.15);--ch:#2d2d2d;--cd:#1c1c1e;--cm:#2a2a2c;--cl:#3a3a3c;--t1:#2d2d2d;--t2:#6b6b6b;--t3:#9a9a9a;--sg:#7d9e8c;--ss:rgba(125,158,140,.15);--rs:#c4787a;--wh:#fff;--r:16px;--r2:10px;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;-webkit-font-smoothing:antialiased}body{font-family:var(--sans);color:var(--t1);overflow-x:hidden;background:var(--cr)}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:center;padding:14px 24px;backdrop-filter:blur(24px);transition:background .3s}
.nL{background:rgba(250,248,244,.88);border-bottom:1px solid rgba(0,0,0,.04)}.nD{background:rgba(28,28,30,.92);border-bottom:1px solid rgba(255,255,255,.06)}
.ni{display:flex;gap:4px;border-radius:100px;padding:4px;transition:all .3s}
.nL .ni{background:var(--wh);box-shadow:0 2px 8px rgba(0,0,0,.04)}.nD .ni{background:var(--cm)}
.nb{font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.02em;padding:10px 24px;border:none;border-radius:100px;cursor:pointer;transition:all .3s;background:transparent}
.nL .nb{color:var(--t2)}.nD .nb{color:rgba(255,255,255,.5)}.nb.on{background:var(--teal);color:var(--wh)!important}
.nL .nb:hover:not(.on){background:var(--ts);color:var(--teal)}.nD .nb:hover:not(.on){background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.Mo{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:2000;display:none;align-items:center;justify-content:center}.Mo.on{display:flex}
.Mb{border-radius:var(--r);padding:40px;width:90%;max-height:85vh;overflow-y:auto;position:relative;animation:fu .4s ease}
.Mx{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .3s}
.Np{position:fixed;top:76px;right:24px;padding:14px 24px;border-radius:var(--r2);background:var(--cm);border:1px solid var(--gs);color:#fff;font-size:13px;display:none;z-index:999;animation:fu .4s ease;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.bp{display:inline-flex;align-items:center;justify-content:center;padding:16px 40px;background:var(--teal);color:#fff;border:none;border-radius:100px;font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:all .3s;letter-spacing:.02em}
.bp:hover{background:var(--tm);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.bk{display:inline-flex;padding:12px 24px;background:transparent;color:var(--t2);border:1.5px solid rgba(0,0,0,.1);border-radius:100px;font-family:var(--sans);font-size:14px;cursor:pointer;transition:all .3s}
.bk:hover{border-color:var(--teal);color:var(--teal)}
.fi{width:100%;padding:16px 20px;border:1.5px solid rgba(0,0,0,.08);border-radius:var(--r2);font-family:var(--sans);font-size:15px;color:var(--ch);background:var(--wh);outline:none;transition:all .3s}
.fi:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--tg)}.fi::placeholder{color:var(--t3)}
.oc{padding:20px;border-radius:var(--r2);background:var(--wh);border:1.5px solid rgba(0,0,0,.06);cursor:pointer;transition:all .3s;text-align:center}
.oc:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.06)}.oc.on{border-color:var(--teal);background:var(--ts)}
.lc{padding:12px;border-radius:var(--r2);background:var(--cm);margin-bottom:8px;cursor:pointer;transition:all .3s;border-left:3px solid transparent}
.lc:hover{background:var(--cl);transform:translateX(2px)}.lc.nw{animation:sg .6s ease forwards;border-left-color:var(--gd)}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sg{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes br{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.intake-bg{background:linear-gradient(135deg,#faf8f4 0%,#f0eeea 25%,#faf8f4 50%,#e8f4f3 75%,#faf8f4 100%);background-size:400% 400%;animation:br 20s ease infinite}
.load-screen{position:fixed;inset:0;background:var(--cr);z-index:3000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s}
.load-screen.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:2px solid rgba(26,107,106,.1);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.metrics-g{grid-template-columns:repeat(2,1fr)!important}.pipe-g{grid-template-columns:1fr!important}.og{grid-template-columns:1fr!important}.split-g{grid-template-columns:1fr!important}.tmpl-g{grid-template-columns:1fr!important}.rpt-g{grid-template-columns:1fr!important}}
</style>
</head>
<body>

<nav id="N" class="nL"><div class="ni">
<button class="nb on" id="nb0" onclick="go(0)">Patient Intake</button>
<button class="nb" id="nb1" onclick="go(1)">Operator Dashboard</button>
<button class="nb" id="nb2" onclick="go(2)">Monthly Report</button>
</div></nav>

<div class="Np" id="NP"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gd);margin-right:8px;animation:pu 1s ease infinite"></span>New inquiry from <strong id="NN"></strong></div>

<div class="Mo" id="calM"><div class="Mb" style="background:var(--cr);max-width:520px">
<button class="Mx" style="background:rgba(0,0,0,.04);color:var(--t2)" onclick="clM('calM')">&times;</button>
<div style="font-family:var(--serif);font-size:22px;font-weight:400;color:var(--teal);text-align:center;margin-bottom:8px">Schedule Your First Session</div>
<div style="font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px">Select a day and time that works for you.</div>
<div id="calW" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:20px"></div>
<div id="calS"></div>
<div id="calC" style="text-align:center;margin-top:24px;display:none"></div>
</div></div>

<div class="Mo" id="jrnM"><div class="Mb" style="background:var(--cm);color:#fff;max-width:600px">
<button class="Mx" style="background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)" onclick="clM('jrnM')">&times;</button>
<div id="jrnC"></div>
</div></div>

<div class="Mo" id="tplM"><div class="Mb" style="background:var(--cm);color:#fff;max-width:560px">
<button class="Mx" style="background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)" onclick="clM('tplM')">&times;</button>
<div id="tplC"></div>
</div></div>

<!-- VIEW 0: INTAKE -->
<div id="V0" style="min-height:100vh;padding-top:72px" class="intake-bg">
<div style="width:100%;max-width:580px;margin:0 auto;padding:40px 24px 60px">
<div style="text-align:center;margin-bottom:48px;opacity:0;animation:fu .8s ease forwards">
<h2 style="font-family:var(--serif);font-size:28px;font-weight:400;color:var(--teal)">Flourish Psychology</h2>
<p style="font-size:13px;color:var(--t3);margin-top:4px;letter-spacing:.08em;text-transform:uppercase">Brooklyn Heights, New York</p>
</div>
<div id="dots" style="display:flex;justify-content:center;gap:8px;margin-bottom:40px"></div>
<div id="s0"></div><div id="s1" style="display:none"></div><div id="s2" style="display:none"></div><div id="s3" style="display:none"></div><div id="s4" style="display:none"></div><div id="s5" style="display:none"></div>
</div>
</div>

<!-- VIEW 1: DASHBOARD -->
<div id="V1" style="display:none;min-height:100vh;padding-top:72px;background:var(--cd);color:#fff"></div>

<!-- VIEW 2: REPORT -->
<div id="V2" style="display:none;min-height:100vh;padding-top:72px;background:var(--cd);color:#fff"></div>
<script>
// === APPS SCRIPT CONFIG ===
// After deploying your Apps Script web app, paste the URL here:
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYW7DkVd4mM_0Dl0VoaWikW9yVf4khov-gwB6yThos0GV7NEXQEQj09x6ksoHKAU3kNA/exec'; // e.g. 'https://script.google.com/macros/s/AKfycbx.../exec'

var D={concerns:[],history:'',name:'',email:'',phone:''},ST=null,cur=0,sDay=null,sSlot=null;
var VM={'Anxiety':"We hear you. Our therapists specialize in exactly this.",'Depression':"Thank you. Our team has deep experience with depression.",'Eating & Body Image':"Thank you. We have therapists who specialize in eating and body image.",'Relationships':"Relationships are central to how we feel. We\u2019re here.",'Trauma':"It takes real courage. Our therapists are trained in EMDR.",'Self-Growth':"Investing in yourself is powerful. Let\u2019s find the right person.",'Work & Career':"We work with high-achievers navigating exactly this.",'Something Else':"Whatever you\u2019re going through, we\u2019re here."};
var CM={'Eating & Body Image':{n:'Dr. Sadi Fox',d:'Specializes in eating disorders and body image.',a:'Next available: Thursday 2:00 PM'},'Anxiety':{n:'Carolyn Light',d:'Extensive experience with anxiety disorders and OCD.',a:'Next available: Wednesday 11:00 AM'},'Depression':{n:'Carolyn Light',d:'Deep expertise in depression and mood disorders.',a:'Next available: Wednesday 11:00 AM'},'Trauma':{n:'Dr. Sadi Fox',d:'Trained in EMDR and trauma-focused approaches.',a:'Next available: Thursday 2:00 PM'},'Relationships':{n:'Carolyn Light',d:'Gottman-trained. Individual and couples sessions.',a:'Next available: Friday 10:00 AM'},'Self-Growth':{n:'Shoshanna Tokar',d:'Self-esteem, confidence, personal development.',a:'Next available: Thursday 3:00 PM'},'Work & Career':{n:'Shoshanna Tokar',d:'Works with high-achievers.',a:'Next available: Thursday 3:00 PM'},'Something Else':{n:'Carolyn Light',d:'Versatile approach for a wide range of concerns.',a:'Next available: Wednesday 11:00 AM'}};
var TPL=[{num:'Touch 1',title:'Auto-Response Email',body:'Hi [Name],\n\nThank you for reaching out to Flourish Psychology about [concern] support. It takes courage to take this step, and we want you to know that we\u2019re here for you.\n\nI\u2019ll personally reach out to you shortly to answer any questions and help you find the right therapist for your needs.\n\nIf you\u2019d like to schedule a time that works best for you, you can book directly here: [booking link]\n\nWe\u2019re looking forward to connecting.\n\nWarmly,\nStephanie\nFlourish Psychology Care Team'},{num:'Touch 2',title:'Same-Day Phone Call Script',body:'Hi [Name], this is Stephanie from Flourish Psychology. I saw that you reached out today about [concern], and I just wanted to personally connect with you. Do you have a few minutes?\n\n[If voicemail]: Hi [Name], this is Stephanie from Flourish Psychology. I\u2019m reaching out because you connected with us earlier today. No rush at all \u2014 I\u2019ll follow up with an email as well. We\u2019re here for you.'},{num:'Touch 3',title:'Day 2 Follow-Up Email',body:'Hi [Name],\n\nI wanted to follow up on my call yesterday. I know reaching out can feel like a big step, and I want to make sure you have everything you need.\n\nIf you\u2019re ready to schedule your first session, you can book a time here: [booking link]\n\nIf you have any questions at all, I\u2019m just an email away.\n\nWarmly,\nStephanie'},{num:'Touch 4',title:'Day 4 Text Message',body:'Hi [Name], it\u2019s Stephanie from Flourish Psychology. Just checking in \u2014 no pressure at all. When you\u2019re ready, you can book directly here: [booking link]. We\u2019re here for you.'},{num:'Touch 5',title:'Day 7 Phone Call Script',body:'Hi [Name], it\u2019s Stephanie from Flourish Psychology again. I\u2019m following up from last week \u2014 I know timing isn\u2019t always perfect, and I just wanted to make sure you know we\u2019re still here whenever you\u2019re ready.\n\n[Adjust based on previous outcomes]'},{num:'Touch 6',title:'Day 10 Final Outreach',body:'Hi [Name],\n\nI wanted to reach out one more time. I understand that the timing may not be right, and that\u2019s completely okay. Our door is always open.\n\nIf anything changes, you can always reach us at [email] or book directly: [booking link]\n\nTake care of yourself.\n\nWarmly,\nStephanie'},{num:'Touch 7',title:'Day 14 Close-Out',body:'[Internal note: Patient moved to nurture list. Periodic re-engagement quarterly. No further active outreach unless patient initiates contact.]'}];

function tn(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
function clM(id){document.getElementById(id).classList.remove('on');}

// === VIEW SWITCHING ===
function go(v){
for(var i=0;i<3;i++){document.getElementById('V'+i).style.display='none';document.getElementById('nb'+i).classList.remove('on');}
document.getElementById('V'+v).style.display='block';document.getElementById('nb'+v).classList.add('on');
var n=document.getElementById('N');n.className=v===0?'nL':'nD';
document.body.style.background=v===0?'var(--cr)':'var(--cd)';
window.scrollTo(0,0);
}

// === DOTS ===
function dots(s){var d=document.getElementById('dots');d.innerHTML='';for(var i=0;i<5;i++){var x=document.createElement('div');x.style.cssText='height:8px;border-radius:50%;transition:all .3s;';if(i<s){x.style.background='var(--sg)';x.style.width='8px';}else if(i===s){x.style.background='var(--teal)';x.style.width='24px';x.style.borderRadius='4px';}else{x.style.background='rgba(0,0,0,.08)';x.style.width='8px';}d.appendChild(x);}}

// === STEP NAVIGATION ===
function stp(s){
document.getElementById('s'+cur).style.display='none';
if(s===2&&D.concerns.length>0){var vt=document.getElementById('vt2');if(vt)vt.textContent=VM[D.concerns[0]]||VM['Something Else'];}
if(s===3){var vt=document.getElementById('vt3');if(vt){vt.textContent=D.history==='No'?"Starting therapy for the first time is a meaningful step. We\u2019ll make sure you feel supported.":D.history==='Yes'?"It\u2019s great that you\u2019ve worked with a therapist before. We\u2019ll build on that.":"";}}
cur=s;var el=document.getElementById('s'+s);el.style.display='block';el.style.opacity='0';el.style.transform='translateY(20px)';
setTimeout(function(){el.style.transition='all .6s ease';el.style.opacity='1';el.style.transform='translateY(0)';},20);
dots(s);
}

function tog(el,v){if(el.classList.contains('on')){el.classList.remove('on');D.concerns=D.concerns.filter(function(c){return c!==v;});}else{el.classList.add('on');D.concerns.push(v);}}
function sel(el,v){el.parentNode.querySelectorAll('.oc').forEach(function(c){c.classList.remove('on');});el.classList.add('on');D.history=v;}

function doSubmit(){
ST=new Date();
D.name=document.getElementById('pn').value||'there';D.email=document.getElementById('pe').value||'';D.phone=document.getElementById('pp').value||'';
var cc=D.concerns,ct='';
if(cc.length===1)ct=cc[0].toLowerCase();else if(cc.length>1)ct=cc.slice(0,-1).map(function(c){return c.toLowerCase();}).join(', ')+' and '+cc[cc.length-1].toLowerCase();
// Send email via Apps Script
if(APPS_SCRIPT_URL&&D.email){try{fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({name:D.name,email:D.email,phone:D.phone,concern:ct})});}catch(e){console.log('Email send error:',e);}}
// Show finding screen
var el=document.getElementById('s5');el.style.display='block';el.style.opacity='0';document.getElementById('s'+cur).style.display='none';cur=5;
el.innerHTML='<div style="text-align:center;padding:80px 0"><div class="spinner" style="margin:0 auto 24px"></div><p style="font-family:var(--serif);font-size:20px;color:var(--teal)">Finding the right fit for you...</p></div>';
el.style.opacity='1';
dots(5);
setTimeout(function(){
var msg=cc.length>0?'You mentioned you\u2019re looking for support with '+ct+'. We have therapists who specialize in exactly that, and Stephanie from our care team will reach out to you shortly to help you find the right fit.':'Stephanie from our care team will reach out to you shortly to connect you with the right therapist.';
el.innerHTML='<div style="text-align:center;padding:60px 0;animation:fu .6s ease"><div style="width:64px;height:64px;border-radius:50%;background:var(--ss);display:flex;align-items:center;justify-content:center;margin:0 auto 28px"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--sg)" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div><h2 style="font-family:var(--serif);font-size:28px;font-weight:400;color:var(--teal);margin-bottom:16px">Thank you, '+D.name+'.</h2><p style="font-size:15px;color:var(--t2);line-height:1.7;max-width:420px;margin:0 auto">'+msg+'</p><br><a onclick="opM(\'calM\');bCal();" style="display:inline-block;margin-top:20px;font-size:14px;color:var(--teal);cursor:pointer;border-bottom:1px solid var(--tg);padding-bottom:2px">Prefer to schedule directly? Book a time here.</a></div>';
setTimeout(function(){dashUp();},2000);
},2000);
}

// === CALENDAR ===
function opM(id){document.getElementById(id).classList.add('on');}
function bCal(){
var w=document.getElementById('calW');w.innerHTML='';var days=['Mon','Tue','Wed','Thu','Fri'];var t=new Date();
for(var i=1;i<=5;i++){(function(idx){var d=new Date(t);d.setDate(t.getDate()+idx);
var el=document.createElement('div');el.style.cssText='padding:10px 16px;border-radius:10px;background:var(--wh);border:1.5px solid rgba(0,0,0,.06);cursor:pointer;text-align:center;min-width:80px;transition:all .3s';
el.innerHTML='<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">'+days[idx%5]+'</div><div style="font-size:15px;font-weight:500;color:var(--ch);margin-top:2px">'+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div>';
el.onclick=function(){w.querySelectorAll(':scope > div').forEach(function(c){c.style.borderColor='rgba(0,0,0,.06)';c.style.background='var(--wh)';});this.style.borderColor='#1a6b6a';this.style.background='var(--ts)';sDay=days[idx%5];shSlots(sDay);};
w.appendChild(el);})(i);}
}
function shSlots(day){
var sl={Mon:[{t:'10:00 AM',c:'Shoshanna Tokar',a:1},{t:'2:00 PM',c:'Henna Samtani',a:1},{t:'4:00 PM',c:'Carolyn Light',a:0}],Tue:[{t:'9:00 AM',c:'Carolyn Light',a:1},{t:'11:00 AM',c:'Shoshanna Tokar',a:1},{t:'3:00 PM',c:'Dr. Fox',a:0}],Wed:[{t:'11:00 AM',c:'Carolyn Light',a:1},{t:'1:00 PM',c:'Henna Samtani',a:1},{t:'3:00 PM',c:'Dr. Fox',a:1}],Thu:[{t:'10:00 AM',c:'Shoshanna Tokar',a:1},{t:'2:00 PM',c:'Dr. Fox',a:1},{t:'4:00 PM',c:'Carolyn Light',a:1}],Fri:[{t:'9:00 AM',c:'Carolyn Light',a:1},{t:'11:00 AM',c:'Henna Samtani',a:0},{t:'2:00 PM',c:'Dr. Fox',a:1}]};
var s=sl[day]||[];
document.getElementById('calS').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+s.map(function(x){return '<div onclick="'+(x.a?'pkSlot(this,\''+x.t+'\',\''+x.c+'\')':'')+'" style="padding:12px;border-radius:10px;background:var(--wh);border:1.5px solid rgba(0,0,0,.06);cursor:'+(x.a?'pointer':'default')+';text-align:center;font-size:14px;color:var(--ch);opacity:'+(x.a?'1':'.35')+';transition:all .3s">'+x.t+(x.a?'':' (Booked)')+'<div style="font-size:11px;color:var(--t3);margin-top:4px">'+x.c+'</div></div>';}).join('')+'</div>';
document.getElementById('calC').style.display='none';
}
function pkSlot(el,t,c){el.parentNode.querySelectorAll(':scope > div').forEach(function(s){s.style.borderColor='rgba(0,0,0,.06)';s.style.background='var(--wh)';});el.style.borderColor='#1a6b6a';el.style.background='var(--ts)';sSlot={t:t,c:c};document.getElementById('calC').style.display='block';document.getElementById('calC').innerHTML='<button class="bp" onclick="book()">Confirm Appointment</button>';}
function book(){clM('calM');addAF(tn(),'cv',D.name||'Patient','Appointment booked with '+sSlot.c+' for '+sDay+' '+sSlot.t);}

// === JOURNEY MODAL ===
function sJ(n,c,h,t){
document.getElementById('jrnC').innerHTML='<div style="margin-bottom:24px"><div style="font-family:var(--serif);font-size:24px;color:#fff;margin-bottom:4px">'+n+'</div><div style="font-size:13px;color:var(--tm);margin-bottom:4px">'+c+(h==='Yes'?' \u2014 Previous therapy experience':' \u2014 First time seeking therapy')+'</div></div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Patient Journey</div><div style="border-left:2px solid var(--teal);padding-left:16px"><div style="margin-bottom:16px"><div style="font-size:11px;color:var(--t3)">'+t+'</div><div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Inquiry received via website intake</div><div style="font-size:12px;color:rgba(255,255,255,.5)">Concern: '+c+'</div></div><div style="margin-bottom:16px"><div style="font-size:11px;color:var(--t3)">'+t+' + 12s</div><div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Auto-response email sent</div><div style="font-size:12px;color:rgba(255,255,255,.5)">Personalized for '+c.toLowerCase()+'</div></div><div style="margin-bottom:16px"><div style="font-size:11px;color:var(--gd)">In progress</div><div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Same-day call \u2014 Stephanie assigned</div></div><div style="opacity:.4"><div style="font-size:11px;color:var(--t3)">Scheduled</div><div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">Touches 3-7 queued</div></div></div>';
opM('jrnM');
}

// === TEMPLATE MODAL ===
